<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luminal Self-Servis</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --surface: #1e293b;
            --accent: #10b981;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-light);
            padding-bottom: 100px;
        }

        .header {
            padding: 2rem 1.5rem;
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.15) 0%, rgba(15, 23, 42, 0) 100%);
            text-align: center;
        }

        .brand {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        .table-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .category-nav {
            display: flex;
            gap: 10px;
            padding: 1rem 1.5rem;
            overflow-x: auto;
            position: sticky;
            top: 0;
            background: var(--bg-dark);
            z-index: 10;
        }

        .cat-btn {
            background: var(--surface);
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 20px;
            white-space: nowrap;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cat-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .menu-list {
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            background: var(--surface);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.2s;
        }

        .menu-item:active {
            transform: scale(0.98);
        }

        .item-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .item-price {
            color: var(--accent);
            font-weight: 800;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 4px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            border: none;
            background: var(--surface);
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .qty-btn.add {
            background: var(--accent);
            color: #000;
        }

        .qty-val {
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }

        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--accent);
            color: #000;
            border-radius: 16px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            font-weight: 800;
            transform: translateY(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .cart-bar.visible {
            transform: translateY(0);
        }

        .cart-info {
            font-size: 1.1rem;
        }

        .checkout-btn {
            background: #000;
            color: var(--accent);
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
        }

        /* Overlay Loader & Success */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 1s ease;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-30px);
            }

            60% {
                transform: translateY(-15px);
            }
        }

        #errorMsg {
            text-align: center;
            padding: 2rem;
            color: #ef4444;
            font-weight: bold;
            display: none;
        }
    </style>
</head>

<body>

    <div id="errorMsg">📍 Geçersiz Masa QR Kodu! Lütfen masanızdaki kodu doğru okutun.</div>

    <div id="app" style="display:none;">
        <div class="header">
            <div class="brand">LUMINAL <span style="font-weight:300;">MENÜ</span></div>
            <div class="table-badge" id="tableIndicator">Masa Yükleniyor...</div>
        </div>

        <div class="category-nav" id="catNav"></div>
        <div class="menu-list" id="menuList"></div>

        <div class="cart-bar" id="cartBar">
            <div class="cart-info">
                <span id="cartCount">0</span> Ürün • ₺<span id="cartTotal">0</span>
            </div>
            <button class="checkout-btn" onclick="submitOrder()">SİPARİŞ VER</button>
        </div>
    </div>

    <!-- Success Screen -->
    <div class="overlay" id="successOverlay">
        <div class="success-icon">🎉</div>
        <h2>Siparişiniz Alındı!</h2>
        <p style="color:var(--text-muted); margin-top:10px; text-align:center; padding: 0 20px;">
            Siparişiniz baristamıza başarıyla iletildi.<br>Hesabınızı kasada ödeyebilirsiniz.
        </p>
    </div>

    <script>
        let tableId = null;
        let menuData = {};
        let cart = {}; // { itemId: quantity }
        let cartTotal = 0;
        let cartCount = 0;
        let currentCat = null;
        let isSending = false;

        // URL'den table_id al
        const urlParams = new URLSearchParams(window.location.search);
        tableId = urlParams.get('table_id');

        if (!tableId) {
            document.getElementById('errorMsg').style.display = 'block';
        } else {
            document.getElementById('app').style.display = 'block';
            document.getElementById('tableIndicator').innerText = `Masa ${tableId}`;
            fetchMenu();
        }

        async function fetchMenu() {
            try {
                const res = await fetch('/public-menu');
                const data = await res.json();
                menuData = data.menu;

                // Kategorileri Listele
                const cats = Object.keys(menuData);
                if (cats.length > 0) {
                    currentCat = cats[0];
                    renderCategories(cats);
                    renderMenu(currentCat);
                }
            } catch (e) {
                console.error("Menü çekilemedi", e);
            }
        }

        function renderCategories(cats) {
            const nav = document.getElementById('catNav');
            nav.innerHTML = cats.map(c => `
                <div class="cat-btn ${c === currentCat ? 'active' : ''}" onclick="selectCategory('${c}')">${c}</div>
            `).join('');
        }

        function selectCategory(cat) {
            currentCat = cat;
            renderCategories(Object.keys(menuData));
            renderMenu(cat);
        }

        function renderMenu(cat) {
            const list = document.getElementById('menuList');
            const items = menuData[cat] || [];

            list.innerHTML = items.map(item => {
                const qty = cart[item.id] || 0;
                return `
                    <div class="menu-item">
                        <div class="item-icon">${item.image_emoji || '☕'}</div>
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">₺${item.price.toFixed(2)}</div>
                        </div>
                        <div class="qty-control">
                            <button class="qty-btn" onclick="updateCart(${item.id}, ${item.price}, -1)">-</button>
                            <div class="qty-val" id="qty-${item.id}">${qty}</div>
                            <button class="qty-btn add" onclick="updateCart(${item.id}, ${item.price}, 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateCart(id, price, delta) {
            if (!cart[id]) cart[id] = 0;

            if (cart[id] + delta >= 0) {
                cart[id] += delta;
                cartCount += delta;
                cartTotal += (price * delta);
            }

            // UI güncellemesi
            const qtyEl = document.getElementById(`qty-${id}`);
            if (qtyEl) qtyEl.innerText = cart[id];

            updateCartUI();
        }

        function updateCartUI() {
            const bar = document.getElementById('cartBar');
            document.getElementById('cartCount').innerText = cartCount;
            document.getElementById('cartTotal').innerText = cartTotal.toFixed(2);

            if (cartCount > 0) {
                bar.classList.add('visible');
            } else {
                bar.classList.remove('visible');
            }
        }

        async function submitOrder() {
            if (isSending || cartCount === 0) return;
            isSending = true;

            const itemsPayload = Object.keys(cart).filter(id => cart[id] > 0).map(id => ({
                menu_item_id: parseInt(id),
                quantity: cart[id]
            }));

            try {
                const res = await fetch('/qr-siparis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        table_id: parseInt(tableId),
                        items: itemsPayload
                    })
                });

                if (res.ok) {
                    document.getElementById('successOverlay').classList.add('active');
                    // 3s sonra sepeti sıfırla, overlayı kapatma kalsın. Müşteri tarayıcıyı kapatsın.
                    setTimeout(() => {
                        cart = {}; cartCount = 0; cartTotal = 0; updateCartUI(); renderMenu(currentCat);
                    }, 500);
                } else {
                    const d = await res.json();
                    alert(d.detail || "Sipariş alınamadı");
                }
            } catch (e) {
                alert("Bağlantı hatası: Lütfen kasanın yanına gidip sipariş veriniz.");
            } finally {
                isSending = false;
            }
        }
    </script>
</body>

</html>
